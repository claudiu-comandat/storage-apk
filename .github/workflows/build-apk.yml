name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # permite declanșare manuală

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # necesar pentru publicarea GitHub Release cu APK-ul

    steps:
      # 1. Checkout cod sursă
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Instalare dependențe (Capacitor + plugins) ignorând conflictele de peer deps
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 3b. Generare versiune build (folosită de aplicație pentru auto-update)
      - name: Generate app version file
        run: echo "window.APP_VERSION_CODE = ${{ github.run_number }};" > www/scripts/version.js

      # 4. Setup Java 17 (necesar pentru Gradle Android)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 5. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 6. Acceptare licențe Android SDK
      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      # 7. Instalare componente Android SDK necesare
      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      # 8. Asigurare platformă Android completă
      - name: Add Android platform
        run: |
          if [ ! -f "android/gradlew" ]; then
            echo "Structură Android incompletă detected. Curățăm și regenerăm..."
            rm -rf android
            npx cap add android
          else
            echo "Platforma Android este prezentă și pare validă."
          fi

      # 8b. Permisiune Android pentru auto-instalare APK (self-update)
      # android/ e regenerat de la zero mai sus, deci se re-adaugă la fiecare build.
      - name: Add self-update permission to manifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "REQUEST_INSTALL_PACKAGES" "$MANIFEST"; then
            sed -i '/<manifest /a\    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />' "$MANIFEST"
          fi

      # 9. Sync Capacitor
      - name: Capacitor Sync
        run: npx cap sync android

      # 10. Acordare permisiuni Gradle wrapper
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      # 10b. Semnătură STABILĂ: refolosește același debug keystore la fiecare build.
      # Fără asta, runner-ul generează un keystore random per build → fiecare APK are
      # altă semnătură → update over-the-top și self-update-ul din aplicație eșuează cu
      # „signatures do not match" (INSTALL_FAILED_UPDATE_INCOMPATIBLE). debug.keystore
      # e commis în repo intenționat: e cheia debug standard (parola publică „android"),
      # nu un secret — servește doar la a păstra identitatea aplicației constantă.
      - name: Use persistent debug keystore
        run: |
          mkdir -p ~/.android
          cp debug.keystore ~/.android/debug.keystore

      # 11. Build APK Debug
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # 12. Upload APK ca artifact descărcabil
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 13. Afișare info APK
      - name: APK Info
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "✅ APK construit cu succes!"
            echo "📦 Dimensiune: $SIZE"
            echo "📍 Cale: $APK_PATH"
          else
            echo "❌ APK-ul nu a fost găsit!"
            exit 1
          fi

      # 14. Publicare GitHub Release cu APK-ul (doar pe push pe main) - sursa pentru auto-update în aplicație
      - name: Publish GitHub Release with APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ github.run_number }}" \
            "android/app/build/outputs/apk/debug/app-debug.apk" \
            --title "Build v${{ github.run_number }}" \
            --notes "Build automat din commit ${{ github.sha }}"
